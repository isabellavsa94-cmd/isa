name: Run DB Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Run migration SQL
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql "postgresql://postgres@db.uhhxiodufwwdhgqreypy.supabase.co:5432/postgres?sslmode=require" <<'SQL'
          create table if not exists clients (
            id text primary key default gen_random_uuid()::text,
            name text not null,
            created_at timestamptz default now()
          );
          alter table clients enable row level security;
          do $$ begin
            if not exists (select 1 from pg_policies where tablename='clients' and policyname='read clients') then
              create policy "read clients" on clients for select to authenticated using (true);
            end if;
            if not exists (select 1 from pg_policies where tablename='clients' and policyname='insert clients') then
              create policy "insert clients" on clients for insert to authenticated with check (true);
            end if;
            if not exists (select 1 from pg_policies where tablename='clients' and policyname='update clients') then
              create policy "update clients" on clients for update to authenticated using (true);
            end if;
          end $$;
          alter table briefings add column if not exists client_id text references clients(id);
          insert into clients (id, name) values ('reportei-flux', 'Reportei Flux') on conflict (id) do nothing;
          update briefings set client_id = 'reportei-flux' where client_id is null;
          SQL
